<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>顧客／廠商管理</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <a href="index.html" class="back-btn">⬅ 回首頁</a>
  <h1>👤 顧客／廠商管理</h1>
</header>

<div class="container">

  <div class="section-title">📋 聯絡人列表</div>
  <div class="toolbar">
    <select id="filter-type" onchange="loadContacts()">
      <option value="">全部類型</option>
      <option value="顧客">顧客</option>
      <option value="廠商">廠商</option>
      <option value="老師">老師</option>
      <option value="其他">其他</option>
    </select>
    <input type="text" id="search-name" placeholder="搜尋姓名" oninput="loadContacts()" />
    <button class="btn-primary" onclick="openContactModal()">＋ 新增</button>
  </div>
  <div id="contact-list" class="card-list"><div class="loading">載入中...</div></div>

</div>

<a href="#" class="fab">▲</a>

<!-- 聯絡人 Modal -->
<div id="contact-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2 id="contact-modal-title">新增聯絡人</h2>
    <input type="hidden" id="contact-id" />
    <label>類型（可多選，逗號分隔）</label>
    <input type="text" id="contact-type" placeholder="例：顧客,老師" />
    <label>姓名／公司名稱</label>
    <input type="text" id="contact-name" placeholder="必填" />
    <label>聯絡人（廠商窗口）</label>
    <input type="text" id="contact-person" placeholder="選填" />
    <label>電話</label>
    <input type="tel" id="contact-phone" placeholder="例：0912-345-678" />
    <label>Email</label>
    <input type="email" id="contact-email" placeholder="選填" />
    <label>地址</label>
    <input type="text" id="contact-address" placeholder="選填" />
    <label>備註</label>
    <input type="text" id="contact-note" placeholder="選填" />
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('contact-modal')">取消</button>
      <button class="btn-primary" onclick="saveContact()">儲存</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  checkAuth();
  loadContacts();

  function loadContacts() {
    const type = document.getElementById("filter-type").value;
    const name = document.getElementById("search-name").value;
    fetchData("getContacts", { type, name }, res => {
      const list = document.getElementById("contact-list");
      if (!res.data || res.data.length === 0) {
        list.innerHTML = `<div class="empty">尚無資料</div>`;
        return;
      }
      list.innerHTML = res.data.map(c => `
        <div class="card" onclick="openEditContact(${JSON.stringify(c).replace(/"/g,'&quot;')})">
          <div class="card-row">
            <span class="card-title">${c.name}</span>
            <span class="badge badge-purple">${c.type}</span>
          </div>
          <div class="card-row">
            <span class="card-sub">${c.phone || ""}${c.email ? "｜" + c.email : ""}</span>
          </div>
          ${c.note ? `<div class="card-sub">${c.note}</div>` : ""}
        </div>`).join("");
    });
  }

  function openContactModal() {
    document.getElementById("contact-modal-title").textContent = "新增聯絡人";
    document.getElementById("contact-id").value = "";
    ["type","name","person","phone","email","address","note"].forEach(f =>
      document.getElementById("contact-" + f).value = ""
    );
    document.getElementById("contact-modal").style.display = "flex";
  }

  function openEditContact(c) {
    document.getElementById("contact-modal-title").textContent = "編輯聯絡人";
    document.getElementById("contact-id").value = c.id;
    document.getElementById("contact-type").value = c.type || "";
    document.getElementById("contact-name").value = c.name || "";
    document.getElementById("contact-person").value = c.person || "";
    document.getElementById("contact-phone").value = c.phone || "";
    document.getElementById("contact-email").value = c.email || "";
    document.getElementById("contact-address").value = c.address || "";
    document.getElementById("contact-note").value = c.note || "";
    document.getElementById("contact-modal").style.display = "flex";
  }

  function saveContact() {
    const name = document.getElementById("contact-name").value.trim();
    if (!name) return alert("請輸入姓名");
    fetchData("saveContact", {
      id: document.getElementById("contact-id").value,
      type: document.getElementById("contact-type").value,
      name,
      person: document.getElementById("contact-person").value,
      phone: document.getElementById("contact-phone").value,
      email: document.getElementById("contact-email").value,
      address: document.getElementById("contact-address").value,
      note: document.getElementById("contact-note").value,
    }, res => {
      if (res.success) { closeModal("contact-modal"); loadContacts(); }
    });
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>樂器店管理系統</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Sans TC", sans-serif;
      background: #f3f0f8;
      color: #333;
    }

    /* 登入畫面 */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #4a148c;
    }
    #login-screen h1 { color: #fff; font-size: 1.6rem; margin-bottom: 24px; }
    #login-screen input {
      padding: 12px 16px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      width: 260px;
      margin-bottom: 12px;
      text-align: center;
    }
    #login-screen button {
      padding: 12px 0;
      width: 260px;
      background: #fff;
      color: #4a148c;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #login-error { color: #ffcccc; font-size: 0.9rem; margin-top: 8px; }

    /* 主畫面 */
    #main-screen { display: none; }

    header {
      background: #4a148c;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.2rem; }
    header button {
      background: rgba(255,255,255,0.2);
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .container { padding: 16px; max-width: 960px; margin: 0 auto; }

    /* 通知區 */
    .section-title {
      font-size: 1rem;
      font-weight: bold;
      color: #4a148c;
      margin: 20px 0 10px;
      border-left: 4px solid #4a148c;
      padding-left: 10px;
    }

    .notice-box {
      background: #fff;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .notice-box .notice-label {
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }
    .notice-item {
      padding: 6px 0;
      border-bottom: 1px solid #f0e6ff;
      font-size: 0.9rem;
    }
    .notice-item:last-child { border-bottom: none; }
    .red { color: #c62828; }
    .orange { color: #e65100; }
    .yellow { color: #f57f17; }
    .blue { color: #1565c0; }

    /* 統計卡片 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }
    .stat-card {
      background: #fff;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .stat-card .stat-value {
      font-size: 1.4rem;
      font-weight: bold;
      color: #4a148c;
    }
    .stat-card .stat-label {
      font-size: 0.8rem;
      color: #888;
      margin-top: 4px;
    }

    /* 月報表 */
    .report-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .report-table th {
      background: #4a148c;
      color: #fff;
      padding: 10px 14px;
      text-align: left;
      font-size: 0.9rem;
    }
    .report-table td {
      padding: 10px 14px;
      border-bottom: 1px solid #f0e6ff;
      font-size: 0.9rem;
    }
    .report-table tr:last-child td { border-bottom: none; }

    /* 功能目錄 */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 30px;
    }
    .menu-card {
      background: #fff;
      border-radius: 10px;
      padding: 18px 14px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      text-decoration: none;
      color: #4a148c;
      font-weight: bold;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    .menu-card:hover { background: #f0e6ff; }
    .menu-card .menu-icon { font-size: 1.8rem; margin-bottom: 6px; }

    .loading { text-align: center; color: #aaa; padding: 12px; font-size: 0.9rem; }
  </style>
</head>
<body>

<!-- 登入畫面 -->
<div id="login-screen">
  <h1>🎵 樂器店管理系統</h1>
  <input type="password" id="password-input" placeholder="請輸入管理者密碼" />
  <button onclick="doLogin()">登入</button>
  <div id="login-error"></div>
</div>

<!-- 主畫面 -->
<div id="main-screen">
  <header>
    <h1>🎵 樂器店管理系統</h1>
    <button onclick="doLogout()">登出</button>
  </header>

  <div class="container">

    <!-- 功能目錄 -->
    <div class="section-title">📂 功能目錄</div>
    <div class="menu-grid">
      <a class="menu-card" href="instruments.html">
        <div class="menu-icon">🎸</div>樂器管理
      </a>
      <a class="menu-card" href="contacts.html">
        <div class="menu-icon">👤</div>顧客／廠商管理
      </a>
      <a class="menu-card" href="rental.html">
        <div class="menu-icon">📋</div>租用管理
      </a>
      <a class="menu-card" href="sales.html">
        <div class="menu-icon">🛒</div>銷售管理
      </a>
      <a class="menu-card" href="purchase.html">
        <div class="menu-icon">📦</div>進貨管理
      </a>
      <a class="menu-card" href="repair.html">
        <div class="menu-icon">🔧</div>維修管理
      </a>
    </div>

    <!-- 今日通知區 -->
    <div class="section-title">📋 今日通知區</div>

    <div class="notice-box">
      <div class="notice-label red">🔴 逾期未繳</div>
      <div id="overdue-list"><div class="loading">載入中...</div></div>
    </div>

    <div class="notice-box">
      <div class="notice-label orange">🟠 今日應繳</div>
      <div id="due-today-list"><div class="loading">載入中...</div></div>
    </div>

    <div class="notice-box">
      <div class="notice-label yellow">🟡 3天內租約到期</div>
      <div id="expiring-list"><div class="loading">載入中...</div></div>
    </div>

    <div class="notice-box">
      <div class="notice-label blue">🔧 維修中樂器</div>
      <div id="repair-list"><div class="loading">載入中...</div></div>
    </div>

    <!-- 即時統計區 -->
    <div class="section-title">📊 即時統計</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="stat-rental-income">-</div>
        <div class="stat-label">本月租金收入</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-sales-income">-</div>
        <div class="stat-label">本月銷售收入</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-renting">-</div>
        <div class="stat-label">租用中樂器數</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-stock">-</div>
        <div class="stat-label">庫存總數</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-repair">-</div>
        <div class="stat-label">維修中樂器</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-new-customers">-</div>
        <div class="stat-label">本月新增顧客</div>
      </div>
    </div>

    <!-- 月報表區 -->
    <div id="monthly-report-section" style="display:none;">
      <div class="section-title">📅 上月報表</div>
      <table class="report-table">
        <thead>
          <tr><th>項目</th><th>數值</th></tr>
        </thead>
        <tbody id="monthly-report-body"></tbody>
      </table>
    </div>

  </div>
</div>

<script src="app.js"></script>
<script>
  // 確保一開始執行
  window.onload = () => {
    if (sessionStorage.getItem("auth") === "1") {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("main-screen").style.display = "block";
      loadDashboard();
    }
  };

  // ===== 登入 =====
  function doLogin() {
    const pwd = document.getElementById("password-input").value.trim();
    if (!pwd) return;
    fetchData("login", { password: pwd }, res => {
      if (res.success) {
        sessionStorage.setItem("auth", "1");
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("main-screen").style.display = "block";
        loadDashboard();
        showToast("歡迎回來");
      } else {
        document.getElementById("login-error").textContent = "密碼錯誤，請重試";
      }
    });
  }

  function doLogout() {
    sessionStorage.removeItem("auth");
    location.reload();
  }

  document.getElementById("password-input").addEventListener("keydown", e => {
    if (e.key === "Enter") doLogin();
  });

  // ===== 儀表板資料載入 =====
  function loadDashboard() {
    fetchData("dashboard", {}, res => {
      renderNotices(res);
      renderStats(res.stats);
      renderMonthlyReport(res.monthly);
    });
  }

  function renderNotices(res) {
    renderList("overdue-list", res.overdue, item =>
      `<div class="notice-item red">• ${escapeHtml(item.customer)}｜${escapeHtml(item.instrument)}｜逾期${item.days}天｜未繳 $${formatCurrency(item.amount)}</div>`
    );
    renderList("due-today-list", res.dueToday, item =>
      `<div class="notice-item orange">• ${escapeHtml(item.customer)}｜${escapeHtml(item.instrument)}｜應繳 $${formatCurrency(item.amount)}</div>`
    );
    renderList("expiring-list", res.expiring, item =>
      `<div class="notice-item yellow">• ${escapeHtml(item.customer)}｜${escapeHtml(item.instrument)}｜${item.days}天後到期｜${escapeHtml(item.renewCount)}</div>`
    );
    renderList("repair-list", res.repairing, item =>
      `<div class="notice-item blue">• ${escapeHtml(item.instrument)}｜${item.date}｜${escapeHtml(item.issue)}</div>`
    );
  }

  function renderList(id, data, template) {
    const el = document.getElementById(id);
    if (!data || data.length === 0) {
      el.innerHTML = `<div class="notice-item" style="color:#aaa">無資料</div>`;
    } else {
      el.innerHTML = data.map(template).join("");
    }
  }

  function renderStats(stats) {
    if (!stats) return;
    document.getElementById("stat-rental-income").textContent = stats.rentalIncome ? `$${formatCurrency(stats.rentalIncome)}` : "-";
    document.getElementById("stat-sales-income").textContent = stats.salesIncome ? `$${formatCurrency(stats.salesIncome)}` : "-";
    document.getElementById("stat-renting").textContent = stats.renting ?? "-";
    document.getElementById("stat-stock").textContent = stats.stock ?? "-";
    document.getElementById("stat-repair").textContent = stats.repair ?? "-";
    document.getElementById("stat-new-customers").textContent = stats.newCustomers ?? "-";
  }

  function renderMonthlyReport(monthly) {
    if (!monthly) return;
    const today = new Date();
    if (today.getDate() !== 1) return; // 只在每月1日顯示
    const rows = [
      ["上月租金總收入", `$${formatCurrency(monthly.rentalIncome)}`],
      ["上月銷售總收入", `$${formatCurrency(monthly.salesIncome)}`],
      ["上月新增顧客數", `${monthly.newCustomers || 0} 人`],
      ["上月進貨總成本", `$${formatCurrency(monthly.purchaseCost)}`],
      ["上月維修次數",   `${monthly.repairCount || 0} 次`],
      ["上月新增租用合約", `${monthly.newContracts || 0} 件`],
    ];
    document.getElementById("monthly-report-body").innerHTML =
      rows.map(([label, val]) => `<tr><td>${label}</td><td>${val}</td></tr>`).join("");
    document.getElementById("monthly-report-section").style.display = "block";
  }
</script>
</body>
</html>
